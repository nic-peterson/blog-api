name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  verify:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: blog_api_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/blog_api_test?schema=public
      TEST_DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/blog_api_test?schema=public
      JWT_SECRET: test-secret
      JWT_EXPIRES_IN: 2h
      CORS_ORIGINS: http://127.0.0.1:4173,http://127.0.0.1:4174
      ALLOW_VERCEL_PREVIEWS: false
      ADMIN_EMAIL: admin@example.com
      ADMIN_PASSWORD: admin12345

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Unit and integration tests
        run: npm run test:unit

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: End-to-end tests
        run: npm run test:e2e
